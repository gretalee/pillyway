# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   SSH_PRIVATE_KEY                  — ED25519/RSA private key; matching public key must be in
#                                      ~/.ssh/authorized_keys on the Hetzner host.
#   HETZNER_HOST                     — Public IP address of the Hetzner CX23 server.
#   HETZNER_USER                     — SSH login user (e.g. root or a dedicated deploy user).
#
#   DIRECT_URL                       — Supabase Cloud direct PostgreSQL URL (no Supavisor).
#                                      Used only by `prisma migrate deploy`.
#   DATABASE_URL                     — Supabase Cloud pooler URL. Injected into the backend
#                                      container at runtime.
#   FRONTEND_URL                     — Public URL of the frontend (e.g. https://pillyway.com).
#   NEXT_PUBLIC_API_URL              — Public URL of the backend API (e.g. https://api.pillyway.com/api).
#                                      Baked into the frontend JS bundle at build time.
#
#   KINDE_ISSUER_URL                 — e.g. https://yourapp.kinde.com
#   KINDE_CLIENT_ID                  — Kinde application client ID (frontend).
#   KINDE_CLIENT_SECRET              — Kinde application client secret (frontend).
#   KINDE_SITE_URL                   — Public URL of the frontend, used by Kinde.
#   KINDE_POST_LOGOUT_REDIRECT_URL   — Where Kinde redirects after logout.
#   KINDE_POST_LOGIN_REDIRECT_URL    — Where Kinde redirects after login.
#
#   SUPABASE_URL                     — Supabase project API URL (https://<ref>.supabase.co).
#   SUPABASE_S3_URL                  — S3-compatible endpoint (Storage → S3 Access → URL).
#   SUPABASE_S3_REGION               — Region shown in Storage → S3 Access.
#   SUPABASE_S3_ACCESS_KEY           — S3 access key from Storage → S3 Access.
#   SUPABASE_S3_SECRET_KEY           — S3 secret key from Storage → S3 Access.
#   SUPABASE_STORAGE_BUCKET          — Exact name of the public bucket created in Storage.
#   SUPABASE_STORAGE_BUCKET_GPX      — Exact name of the private bucket for GPX files.
#
# No env files need to be created manually on the server. The deploy job writes a
# fresh .env from GitHub Secrets on every deployment.

name: CD — Deploy

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests — gate for all subsequent jobs
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        run: yarn --cwd apps/backend install --frozen-lockfile

      - name: Install frontend dependencies
        run: yarn --cwd apps/frontend install --frozen-lockfile

      - name: Run unit tests
        run: yarn test

  # ---------------------------------------------------------------------------
  # Job 2: Build Docker images and push to GitHub Container Registry
  # Migrations run inside the container at startup (entrypoint.sh) so that
  # schema and code are always deployed atomically.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    environment: PROD
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pillyway-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pillyway-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            KINDE_ISSUER_URL=${{ secrets.KINDE_ISSUER_URL }}
            KINDE_CLIENT_ID=${{ secrets.KINDE_CLIENT_ID }}
            KINDE_CLIENT_SECRET=${{ secrets.KINDE_CLIENT_SECRET }}
            KINDE_SITE_URL=${{ secrets.KINDE_SITE_URL }}
            KINDE_POST_LOGOUT_REDIRECT_URL=${{ secrets.KINDE_POST_LOGOUT_REDIRECT_URL }}
            KINDE_POST_LOGIN_REDIRECT_URL=${{ secrets.KINDE_POST_LOGIN_REDIRECT_URL }}

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Hetzner — runs after both migrate and build succeed
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: [build]
    environment: PROD
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/pillyway/

      - name: Pull images and restart services
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/pillyway-backend:latest
          IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/pillyway-frontend:latest
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          KINDE_ISSUER_URL: ${{ secrets.KINDE_ISSUER_URL }}
          KINDE_CLIENT_ID: ${{ secrets.KINDE_CLIENT_ID }}
          KINDE_CLIENT_SECRET: ${{ secrets.KINDE_CLIENT_SECRET }}
          KINDE_SITE_URL: ${{ secrets.KINDE_SITE_URL }}
          KINDE_POST_LOGOUT_REDIRECT_URL: ${{ secrets.KINDE_POST_LOGOUT_REDIRECT_URL }}
          KINDE_POST_LOGIN_REDIRECT_URL: ${{ secrets.KINDE_POST_LOGIN_REDIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_S3_URL: ${{ secrets.SUPABASE_S3_URL }}
          SUPABASE_S3_REGION: ${{ secrets.SUPABASE_S3_REGION }}
          SUPABASE_S3_ACCESS_KEY: ${{ secrets.SUPABASE_S3_ACCESS_KEY }}
          SUPABASE_S3_SECRET_KEY: ${{ secrets.SUPABASE_S3_SECRET_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_STORAGE_BUCKET_GPX: ${{ secrets.SUPABASE_STORAGE_BUCKET_GPX }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_BACKEND,IMAGE_FRONTEND,DATABASE_URL,DIRECT_URL,FRONTEND_URL,KINDE_ISSUER_URL,KINDE_CLIENT_ID,KINDE_CLIENT_SECRET,KINDE_SITE_URL,KINDE_POST_LOGOUT_REDIRECT_URL,KINDE_POST_LOGIN_REDIRECT_URL,SUPABASE_URL,SUPABASE_S3_URL,SUPABASE_S3_REGION,SUPABASE_S3_ACCESS_KEY,SUPABASE_S3_SECRET_KEY,SUPABASE_STORAGE_BUCKET,SUPABASE_STORAGE_BUCKET_GPX
          script: |
            # Write a fresh .env from GitHub Secrets — docker compose reads it automatically
            mkdir -p /opt/pillyway
            umask 077
            cat > /opt/pillyway/.env << EOF
            IMAGE_BACKEND=$IMAGE_BACKEND
            IMAGE_FRONTEND=$IMAGE_FRONTEND
            DATABASE_URL=$DATABASE_URL
            DIRECT_URL=$DIRECT_URL
            FRONTEND_URL=$FRONTEND_URL
            KINDE_ISSUER_URL=$KINDE_ISSUER_URL
            KINDE_CLIENT_ID=$KINDE_CLIENT_ID
            KINDE_CLIENT_SECRET=$KINDE_CLIENT_SECRET
            KINDE_SITE_URL=$KINDE_SITE_URL
            KINDE_POST_LOGOUT_REDIRECT_URL=$KINDE_POST_LOGOUT_REDIRECT_URL
            KINDE_POST_LOGIN_REDIRECT_URL=$KINDE_POST_LOGIN_REDIRECT_URL
            SUPABASE_URL=$SUPABASE_URL
            SUPABASE_S3_URL=$SUPABASE_S3_URL
            SUPABASE_S3_REGION=$SUPABASE_S3_REGION
            SUPABASE_S3_ACCESS_KEY=$SUPABASE_S3_ACCESS_KEY
            SUPABASE_S3_SECRET_KEY=$SUPABASE_S3_SECRET_KEY
            SUPABASE_STORAGE_BUCKET=$SUPABASE_STORAGE_BUCKET
            SUPABASE_STORAGE_BUCKET_GPX=$SUPABASE_STORAGE_BUCKET_GPX
            EOF
            chmod 600 /opt/pillyway/.env

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f /opt/pillyway/docker-compose.prod.yml pull
            docker compose -f /opt/pillyway/docker-compose.prod.yml up -d --remove-orphans

            echo "Waiting for backend to start (migrations may take a moment)..."
            RETRIES=0
            until docker compose -f /opt/pillyway/docker-compose.prod.yml ps --status running --services 2>/dev/null | grep -q "^backend$"; do
              RETRIES=$((RETRIES + 1))
              if [ $RETRIES -ge 12 ]; then
                echo "Backend did not reach running state after 60 s. Recent logs:"
                docker compose -f /opt/pillyway/docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              sleep 5
            done
            echo "Backend is running."

            docker image prune -f
