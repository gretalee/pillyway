name: CI — Unit Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
jobs:
  test:
    name: Unit Tests (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Cache (restore from cache) dependencies
        uses: actions/cache@v4
        with:
          path: |
            app/backend/node_modules
            app/frontend/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('app/backend/yarn.lock', 'app/frontend/yarn.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install backend dependencies
        run: yarn --cwd app/backend install --frozen-lockfile

      - name: Install frontend dependencies
        run: yarn --cwd app/frontend install --frozen-lockfile

      - name: Run unit tests
        run: yarn test
